name: Build debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and publish debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure Android SDK platform 36
        run: yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" > /dev/null

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: swing-music-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            "app/build/outputs/apk/debug/app-debug.apk#app-debug.apk" \
            --title "Dernier build debug" \
            --notes "APK de debug compilé automatiquement depuis main."
